packages:
  - 'backend/**'
  - 'mobile-app/**'
  - 'shared'
  - 'vault-web/**'
  - 'web-extension/**'
  # if required, exclude some directories
  - '!backend/dist/**'
  - '!vault-web/dist/**'
  - '!web-extension/dist/**'

overrides:
  ajv: ^8.18.0
  react: ^19.2.4
  react-dom: ^19.2.4
  '@types/react': ^19
  '@types/react-dom': ^19

patchedDependencies:
  '@react-native/gradle-plugin': patches/@react-native__gradle-plugin.patch
  native-base@3.4.28: patches/native-base@3.4.28.patch
  '@graphql-codegen/typescript-react-apollo': patches/@graphql-codegen__typescript-react-apollo.patch

minimumReleaseAgeExclude:
  - '@types/chrome@0.2.0'
  - lint-staged@17.0.8
  - sql-formatter@15.8.2

allowBuilds:
  '@capaj/type-graphql': true
  '@firebase/util': true
  '@prisma/engines': true
  '@sentry/cli': true
  '@swc/core': true
  core-js: true
  esbuild: true
  prisma: true
  protobufjs: true
  puppeteer: true
  react-grab: true
  sharp: true
  type-graphql: true
  vue-demi: true
  workerd: true

# minimumReleaseAge: 1440
