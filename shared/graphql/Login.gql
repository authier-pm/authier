mutation addNewDeviceForUser(
  $email: EmailAddress!
  $deviceInput: DeviceInput!
  $currentAddDeviceSecret: NonEmptyString!
  $input: AddNewDeviceInput!
  $deviceId: String!
) {
  deviceDecryptionChallenge(email: $email, deviceInput: $deviceInput) {
    ... on DecryptionChallengeApproved {
      id
      addNewDeviceForUser(
        currentAddDeviceSecret: $currentAddDeviceSecret
        input: $input
      ) {
        accessToken
        user {
          id
          uiLanguage
          EncryptedSecrets {
            id
            encrypted
            kind
            createdAt
            updatedAt
            version
          }
          notificationOnVaultUnlock
          notificationOnWrongPasswordAttempts
          device(id: $deviceId) {
            id
            syncTOTP
            vaultLockTimeoutSeconds
            autofillCredentialsEnabled
            autofillTOTPEnabled
          }
          defaultDeviceSettings {
            id
            autofillTOTPEnabled
            autofillCredentialsEnabled
            theme
            syncTOTP
            vaultLockTimeoutSeconds
          }
        }
      }
    }
  }
}

mutation deviceDecryptionChallenge(
  $email: EmailAddress!
  $deviceInput: DeviceInput!
) {
  deviceDecryptionChallenge(email: $email, deviceInput: $deviceInput) {
    ... on DecryptionChallengeApproved {
      id
      addDeviceSecretEncrypted
      encryptionSalt
      userId
      approvedAt
      deviceId
      deviceName
    }
    ... on DecryptionChallengeForApproval {
      id
      pushNotificationsSentCount
      pushNotificationsFailedCount
      masterDeviceResetRequestedAt
      masterDeviceResetProcessAt
      masterDeviceResetConfirmedAt
      masterDeviceResetRejectedAt
    }
  }
}

mutation initiateMasterDeviceReset(
  $email: EmailAddress!
  $deviceInput: DeviceInput!
  $decryptionChallengeId: PositiveInt!
) {
  initiateMasterDeviceReset(
    email: $email
    deviceInput: $deviceInput
    decryptionChallengeId: $decryptionChallengeId
  ) {
    requestedAt
    processAt
    alreadyPending
  }
}
